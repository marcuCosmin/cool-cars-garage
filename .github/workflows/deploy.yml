on:
    push:
        branches:
            - main
        paths:
            - "packages/react/**"
            - "packages/express/**"
            - "packages/jobs/**"
            - "packages/shared/**"
            - ".github/workflows/deploy.yml"

name: Deploy

jobs:
    deploy-react:
        name: Deploy React
        runs-on: ubuntu-latest
        if: |
            contains(toJSON(github.event.commits.*.modified), 'packages/react') ||
            contains(toJSON(github.event.commits.*.modified), 'packages/shared/globals')
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24.14.1"

            - name: Build Project
              run: npm install && npm run build:react
              env:
                  VITE_API_URL: https://api.cool-cars-garage.co.uk
                  VITE_REPORTS_AUTH_URL: coolcarsreports://auth

            - name: Set up SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519

            - name: Add server to known_hosts
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Sync Files
              run: rsync -avz --progress --delete --exclude='.deploy' -e "ssh -i ~/.ssh/id_ed25519" ./packages/react/dist/ ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/cool-cars-garage-client/

    deploy-express:
        name: Deploy Express
        runs-on: ubuntu-latest
        needs: deploy-react
        if: |
            always() &&
            (contains(toJSON(github.event.commits.*.modified), 'packages/express') ||
            contains(toJSON(github.event.commits.*.modified), 'packages/shared'))
        env:
            FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.15.0"

            - name: Build Project
              run: npm install && npm run build:express

            - name: Copy package.json and package-lock.json to dist
              run: cp packages/express/package*.json packages/express/dist/

            - name: Set up SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519

            - name: Add server to known_hosts
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Sync Files
              run: rsync -avz --progress --delete --exclude='.deploy' --exclude='jobs/' --exclude='node_modules/' -e "ssh -i ~/.ssh/id_ed25519" ./packages/express/dist/ ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/cool-cars-garage-api/

            - name: Create deploy File
              run: echo "deploy_$(date +'%Y%m%d%H%M%S')" > .deploy

            - name: Update Deploy File
              run: rsync -avz --progress -e "ssh -i ~/.ssh/id_ed25519" .deploy ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/cool-cars-garage-api/

    deploy-jobs:
        name: Deploy Jobs
        runs-on: ubuntu-latest
        needs: deploy-express
        if: |
            always() &&
            (contains(toJSON(github.event.commits.*.modified), 'packages/jobs') ||
            contains(toJSON(github.event.commits.*.modified), 'packages/shared'))
        env:
            FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20.15.0"

            - name: Build Project
              run: npm install && npm run build:jobs

            - name: Copy package.json and package-lock.json to dist
              run: cp packages/jobs/package*.json packages/jobs/dist/

            - name: Set up SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519

            - name: Add server to known_hosts
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

            - name: Sync Files
              run: rsync -avz --progress --delete --exclude='.deploy' --exclude='jobs/' --exclude='node_modules/' -e "ssh -i ~/.ssh/id_ed25519" ./packages/jobs/dist/ ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/cool-cars-garage-jobs/

            - name: Create deploy File
              run: echo "deploy_$(date +'%Y%m%d%H%M%S')" > .deploy

            - name: Update Deploy File
              run: rsync -avz --progress -e "ssh -i ~/.ssh/id_ed25519" .deploy ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_HOST }}:/cool-cars-garage-jobs/
